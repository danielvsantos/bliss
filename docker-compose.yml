services:
  # ────────────────────────────────────────────────────────────────────────────
  # Infrastructure
  # ────────────────────────────────────────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: bliss
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: bliss
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bliss"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD:-changeme}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-changeme}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    # Internal only — not exposed to host

  # ────────────────────────────────────────────────────────────────────────────
  # API layer (Next.js)
  # ────────────────────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://bliss:${POSTGRES_PASSWORD:-changeme}@postgres:5432/bliss
      JWT_SECRET_CURRENT: ${JWT_SECRET_CURRENT}
      JWT_SECRET_PREVIOUS: ${JWT_SECRET_PREVIOUS:-}
      ENCRYPTION_SECRET: ${ENCRYPTION_SECRET}
      ENCRYPTION_SECRET_PREVIOUS: ${ENCRYPTION_SECRET_PREVIOUS:-}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
      BACKEND_URL: http://backend:3001
      STORAGE_BACKEND: ${STORAGE_BACKEND:-local}
      LOCAL_STORAGE_DIR: /app/data/uploads
      # Optional: GCS (only needed when STORAGE_BACKEND=gcs)
      GCS_BUCKET_NAME: ${GCS_BUCKET_NAME:-}
      GCS_SERVICE_ACCOUNT_JSON: ${GCS_SERVICE_ACCOUNT_JSON:-}
      # Optional: Plaid
      PLAID_CLIENT_ID: ${PLAID_CLIENT_ID:-}
      PLAID_SECRET: ${PLAID_SECRET:-}
      PLAID_ENV: ${PLAID_ENV:-sandbox}
      # Optional: AI
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      # Optional: Sentry / OTEL
      SENTRY_DSN: ${SENTRY_DSN:-}
      SENTRY_ORG: ${SENTRY_ORG:-}
      SENTRY_PROJECT: ${SENTRY_PROJECT:-}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:8080}
      COOKIE_DOMAIN: ${COOKIE_DOMAIN:-}
    volumes:
      - uploads_data:/app/data/uploads
    depends_on:
      postgres:
        condition: service_healthy

  # ────────────────────────────────────────────────────────────────────────────
  # Backend service (Express + BullMQ workers)
  # ────────────────────────────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    # Internal only — not exposed to host
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://bliss:${POSTGRES_PASSWORD:-changeme}@postgres:5432/bliss
      REDIS_URL: redis://:${REDIS_PASSWORD:-changeme}@redis:6379
      REDIS_SKIP_TLS_CHECK: "true"
      ENCRYPTION_SECRET: ${ENCRYPTION_SECRET}
      ENCRYPTION_SECRET_PREVIOUS: ${ENCRYPTION_SECRET_PREVIOUS:-}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
      ALLOWED_ORIGINS: http://api:3000
      STORAGE_BACKEND: ${STORAGE_BACKEND:-local}
      LOCAL_STORAGE_DIR: /app/data/uploads
      # Optional: GCS
      GCS_BUCKET_NAME: ${GCS_BUCKET_NAME:-}
      GCS_SERVICE_ACCOUNT_JSON: ${GCS_SERVICE_ACCOUNT_JSON:-}
      # Optional: AI
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      # Optional: Plaid
      PLAID_CLIENT_ID: ${PLAID_CLIENT_ID:-}
      PLAID_SECRET: ${PLAID_SECRET:-}
      PLAID_ENV: ${PLAID_ENV:-sandbox}
      # Optional: Sentry
      SENTRY_DSN: ${SENTRY_DSN:-}
      # Optional: Market data
      STOCK_PROVIDER: ${STOCK_PROVIDER:-TWELVE_DATA}
      TWELVE_DATA_API_KEY: ${TWELVE_DATA_API_KEY:-}
      FINNHUB_API_KEY: ${FINNHUB_API_KEY:-}
      # Optional: Currency rates
      CURRENCYLAYER_API_KEY: ${CURRENCYLAYER_API_KEY:-}
    volumes:
      - uploads_data:/app/data/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ────────────────────────────────────────────────────────────────────────────
  # Web (Vite React SPA served by nginx)
  # ────────────────────────────────────────────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: docker/Dockerfile.web
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3000}
    ports:
      - "8080:80"
    depends_on:
      - api

  # ────────────────────────────────────────────────────────────────────────────
  # Adminer (lightweight database GUI)
  # ────────────────────────────────────────────────────────────────────────────
  adminer:
    image: adminer:latest
    ports:
      - "8888:8080"
    environment:
      ADMINER_DEFAULT_SERVER: postgres
      ADMINER_DESIGN: pepa-linha-dark
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  uploads_data:
