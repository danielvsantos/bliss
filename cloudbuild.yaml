steps:
  # Build the backend Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/bliss/backend:$COMMIT_SHA'
      - '-t'
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/bliss/backend:latest'
      - '-f'
      - 'docker/Dockerfile.backend.cloudrun'
      - '.'

  # Push to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '--all-tags'
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/bliss/backend'

  # Run database migrations via Cloud Run Job
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'jobs'
      - 'execute'
      - 'bliss-migrate'
      - '--wait'
      - '--region'
      - '${_REGION}'

  # Deploy new revision to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'bliss-backend'
      - '--image=${_REGION}-docker.pkg.dev/$PROJECT_ID/bliss/backend:$COMMIT_SHA'
      - '--region=${_REGION}'
      - '--memory=512Mi'
      - '--min-instances=0'
      - '--max-instances=3'
      - '--concurrency=10'
      - '--set-env-vars=NODE_ENV=production,REDIS_SKIP_TLS_CHECK=false,STORAGE_BACKEND=gcs,PORT=8080'
      - '--set-secrets=DATABASE_URL=bliss-database-url:latest,REDIS_URL=bliss-redis-url:latest,ENCRYPTION_SECRET=bliss-encryption-secret:latest,INTERNAL_API_KEY=bliss-internal-api-key:latest,GEMINI_API_KEY=bliss-gemini-api-key:latest,PLAID_CLIENT_ID=bliss-plaid-client-id:latest,PLAID_SECRET=bliss-plaid-secret:latest'

substitutions:
  _REGION: us-central1

options:
  logging: CLOUD_LOGGING_ONLY
