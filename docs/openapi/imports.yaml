openapi: 3.0.0
info:
  title: Bliss API Layer - Smart Import
  version: 1.0.0
  description: |
    API endpoints for the intelligent CSV import pipeline (Sprint 4+).
    The smart import flow: detect adapter → upload CSV → poll for staged transactions → review & commit.
    Sprint 8 adds vector similarity suggestions (`GET /api/imports/similar`) and deferred embedding
    generation at commit time.

components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: token
      description: >
        HttpOnly session cookie set by the API at sign-in/sign-up.
        Sent automatically by the browser on all credentialed requests.

  schemas:
    Adapter:
      type: object
      description: A CSV adapter configuration that maps bank-specific column formats to Bliss fields.
      properties:
        id:
          type: string
          example: 'clx...'
        name:
          type: string
          example: 'Chase Checking'
        bankName:
          type: string
          example: 'Chase'
        columnMappings:
          type: object
          description: Maps Bliss field names to source CSV column names.
          additionalProperties:
            type: string
          example:
            date: 'Transaction Date'
            description: 'Description'
            amount: 'Amount'
            debit: 'Debit'
            credit: 'Credit'

    StagedRow:
      type: object
      description: A single CSV row staged for review, enriched with the resolved category.
      properties:
        id:
          type: string
          example: 'clx...'
        stagedImportId:
          type: string
        rowNumber:
          type: integer
          description: 1-based position in the original CSV.
        status:
          type: string
          enum: [PENDING, CONFIRMED, SKIPPED, DUPLICATE, POTENTIAL_DUPLICATE, ERROR, STAGED]
          description: |
            Row state. `PENDING` awaits user action; `CONFIRMED` is ready to commit;
            `POTENTIAL_DUPLICATE` matches an existing transaction softly (date/amount but
            not timestamp); `DUPLICATE` is a hard match and is hidden from the Review UI by
            default; `STAGED` is the initial worker output before classification finalises.
        transactionDate:
          type: string
          format: date-time
          nullable: true
        description:
          type: string
          nullable: true
        debit:
          type: number
          nullable: true
        credit:
          type: number
          nullable: true
        currency:
          type: string
          nullable: true
          example: 'USD'
        accountId:
          type: integer
          nullable: true
        suggestedCategoryId:
          type: integer
          nullable: true
        suggestedCategory:
          type: object
          nullable: true
          description: Enriched category snapshot joined in by the handler (not stored on the row).
          properties:
            id:
              type: integer
            name:
              type: string
            group:
              type: string
            type:
              type: string
        classificationSource:
          type: string
          nullable: true
          enum: [EXACT_MATCH, VECTOR_MATCH, LLM, USER_OVERRIDE]
          description: Which classification tier produced the suggested category.
        confidence:
          type: number
          nullable: true
          description: AI classification confidence (0–1).
        details:
          type: string
          nullable: true
          description: User-supplied free-text note, persisted to `Transaction.details` on commit.
        requiresEnrichment:
          type: boolean
          nullable: true
          description: True when this row needs investment-detail enrichment before it can be CONFIRMED.
        enrichmentType:
          type: string
          nullable: true
          description: e.g. `INVESTMENT`.
        ticker:
          type: string
          nullable: true
        assetQuantity:
          type: number
          nullable: true
        assetPrice:
          type: number
          nullable: true
        tags:
          type: array
          nullable: true
          items:
            type: string
          description: Optional tag names (e.g. ["Japan 2026", "Business"]). Tags are auto-created and linked at commit time.
        updateTargetId:
          type: integer
          nullable: true
          description: When non-null, this row updates an existing Transaction rather than creating one.
        updateDiff:
          type: object
          nullable: true
          description: Computed diff between CSV values and the existing transaction (changed fields only).

    SimilarTransactionResult:
      type: object
      description: A single result from the vector similarity search.
      properties:
        id:
          type: string
          description: The TransactionEmbedding record ID.
        transactionId:
          type: integer
          nullable: true
          description: |
            The confirmed Transaction ID this embedding was generated from.
            Null for embeddings created before transactionId tracking was added.
        description:
          type: string
          description: The normalised transaction description that was previously classified.
          example: "Netflix subscription"
        categoryId:
          type: integer
          description: The confirmed category ID.
          example: 42
        categoryName:
          type: string
          description: The human-readable category name.
          example: "Streaming Services"
        similarity:
          type: number
          format: float
          description: Cosine similarity score (0.0–1.0). Higher = more similar.
          example: 0.93
        source:
          type: string
          enum: [USER_CONFIRMED, AUTO_CONFIRMED, GLOBAL]
          description: |
            How this embedding was recorded:
            - USER_CONFIRMED — user manually confirmed the category
            - AUTO_CONFIRMED — auto-promoted by the classification pipeline
            - GLOBAL — cross-tenant GlobalEmbedding entry

security:
  - cookieAuth: []

paths:
  /api/imports/detect-adapter:
    post:
      summary: Detect CSV adapter from column headers
      description: |
        Analyzes the first row (headers) of a CSV file to identify the most likely adapter
        configuration to use for parsing. Returns the best match and confidence score.
      tags:
        - Smart Import
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - headers
              properties:
                headers:
                  type: array
                  items:
                    type: string
                  description: The column header names from the CSV file.
                  example: ['Transaction Date', 'Post Date', 'Description', 'Amount', 'Type']
      responses:
        '200':
          description: Detection result with best-matched adapter.
          content:
            application/json:
              schema:
                type: object
                properties:
                  adapter:
                    $ref: '#/components/schemas/Adapter'
                    nullable: true
                    description: The best-matching adapter, or null if none found.
                  confidence:
                    type: number
                    description: Match confidence score (0–1).
                  suggestions:
                    type: array
                    description: Other potential adapter matches.
                    items:
                      $ref: '#/components/schemas/Adapter'
        '400':
          description: Bad Request — missing or invalid headers.
        '401':
          description: Unauthorized
        '500':
          description: Internal Server Error

  /api/imports/adapters:
    get:
      summary: List all adapters for the tenant
      description: Returns all CSV adapter configurations available to the authenticated tenant.
      tags:
        - Smart Import
      responses:
        '200':
          description: Array of adapter configurations.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Adapter'
        '401':
          description: Unauthorized
        '500':
          description: Internal Server Error
    post:
      summary: Create a new adapter
      description: Creates a new CSV adapter configuration for the authenticated tenant.
      tags:
        - Smart Import
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
                - columnMappings
              properties:
                name:
                  type: string
                bankName:
                  type: string
                columnMappings:
                  type: object
                  additionalProperties:
                    type: string
      responses:
        '201':
          description: Adapter created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Adapter'
        '400':
          description: Bad Request — missing required fields.
        '401':
          description: Unauthorized
        '500':
          description: Internal Server Error

  /api/imports/adapters/{id}:
    put:
      summary: Update an existing adapter
      description: |
        Updates the name, bankName, or columnMappings of an existing CSV adapter.
        Only the fields provided in the request body are changed — omitted fields
        are left untouched. Only the tenant that owns the adapter can update it.
      tags:
        - Smart Import
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: The adapter ID to update.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: At least one field must be provided.
              properties:
                name:
                  type: string
                bankName:
                  type: string
                columnMappings:
                  type: object
                  additionalProperties:
                    type: string
      responses:
        '200':
          description: Adapter updated successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Adapter'
        '400':
          description: Bad Request — no valid fields to update.
        '401':
          description: Unauthorized
        '403':
          description: Access denied — this adapter belongs to another tenant.
        '404':
          description: Adapter not found.
        '500':
          description: Internal Server Error
    delete:
      summary: Delete an adapter
      description: |
        Permanently deletes a CSV adapter configuration. Only the tenant that owns
        the adapter can delete it. This operation cannot be undone.
      tags:
        - Smart Import
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: The adapter ID to delete.
      responses:
        '204':
          description: Adapter deleted successfully (no content).
        '401':
          description: Unauthorized
        '403':
          description: Access denied — this adapter belongs to another tenant.
        '404':
          description: Adapter not found.
        '500':
          description: Internal Server Error

  /api/imports/upload:
    post:
      summary: Upload a CSV file to start a smart import
      description: |
        Accepts a multipart/form-data CSV file upload. Creates a StagedImport record immediately
        (returns its ID) and enqueues a `SMART_IMPORT_REQUESTED` event for background processing.
        Poll `GET /api/imports/{id}` to check processing status.
      tags:
        - Smart Import
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
                - adapterId
                - accountId
              properties:
                file:
                  type: string
                  format: binary
                  description: The CSV file to import.
                adapterId:
                  type: string
                  description: The adapter configuration ID to use for parsing.
                accountId:
                  type: integer
                  description: The target account ID to associate transactions with.
      responses:
        '202':
          description: Upload accepted, processing started.
          content:
            application/json:
              schema:
                type: object
                properties:
                  stagedImportId:
                    type: string
                    description: The ID of the created StagedImport batch. Use this to poll for status.
                  status:
                    type: string
                    enum: [PROCESSING]
                    description: Initial status of the newly-created import.
                  message:
                    type: string
                    example: 'File uploaded successfully. Import processing has started.'
        '400':
          description: Bad Request — missing file, adapterId, or accountId.
        '401':
          description: Unauthorized
        '500':
          description: Internal Server Error

  /api/imports/pending:
    get:
      summary: List pending/staged imports
      description: |
        Returns staged imports for the authenticated tenant that still have rows awaiting
        commit. Each entry is a thin summary (not the full `StagedImport`) and is filtered
        to those with `pendingRowCount > 0` — where pending counts rows in
        `CONFIRMED`, `PENDING`, or `POTENTIAL_DUPLICATE` status. The response is sent with
        `Cache-Control: no-store, no-cache, must-revalidate` to prevent stale 304s.
      tags:
        - Smart Import
      responses:
        '200':
          description: Object with the list of pending imports.
          content:
            application/json:
              schema:
                type: object
                properties:
                  imports:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        fileName:
                          type: string
                        adapterName:
                          type: string
                          nullable: true
                        accountId:
                          type: integer
                          nullable: true
                        totalRows:
                          type: integer
                        pendingRowCount:
                          type: integer
                          description: Rows still in CONFIRMED, PENDING, or POTENTIAL_DUPLICATE.
                        createdAt:
                          type: string
                          format: date-time
        '401':
          description: Unauthorized
        '500':
          description: Internal Server Error

  /api/imports/{id}:
    get:
      summary: Get a staged import batch
      description: Returns the full details of a StagedImport, including all staged rows, their AI classification, and deduplication status.
      tags:
        - Smart Import
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: The StagedImport ID.
        - name: page
          in: query
          required: false
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 50
            maximum: 200
        - name: status
          in: query
          required: false
          schema:
            type: string
          description: |
            Row status filter. Accepts a single value (e.g. `CONFIRMED`) or a comma-separated
            list (e.g. `STAGED,POTENTIAL_DUPLICATE`). When omitted, defaults to
            `PENDING,POTENTIAL_DUPLICATE,CONFIRMED,ERROR,STAGED,DUPLICATE` — only `SKIPPED`
            (explicit user dismissal) is hidden by default. `DUPLICATE` rows surface so the
            user can audit what dedup filtered; bulk-confirm and the per-row PUT both refuse
            `DUPLICATE`, so visibility is safe.
        - name: categoryId
          in: query
          required: false
          schema:
            type: integer
          description: |
            Filters rows to a single `suggestedCategoryId`. Used by the grouped-view to
            paginate within one category group without re-fetching all rows.
        - name: uncategorized
          in: query
          required: false
          schema:
            type: boolean
          description: |
            When `true`, filters rows to those with `suggestedCategoryId IS NULL`. Mutually
            exclusive with `categoryId` (when both are sent, `uncategorized` wins). Needed so
            the "Uncategorized" group in the grouped view is drillable.
      responses:
        '200':
          description: |
            The staged import wrapper with paginated rows, server-side category breakdown,
            and pagination metadata.
          content:
            application/json:
              schema:
                type: object
                properties:
                  import:
                    type: object
                    properties:
                      id:
                        type: string
                      status:
                        type: string
                        enum: [PENDING, PROCESSING, READY, COMMITTING, COMMITTED, CANCELLED, FAILED]
                      fileName:
                        type: string
                      adapterName:
                        type: string
                        nullable: true
                      accountId:
                        type: integer
                        nullable: true
                      totalRows:
                        type: integer
                      progress:
                        type: integer
                        description: 0–100, percent complete during PROCESSING and COMMITTING.
                      errorCount:
                        type: integer
                      errorDetails:
                        type: string
                        nullable: true
                      autoConfirmedCount:
                        type: integer
                        nullable: true
                        description: Rows auto-confirmed via EXACT_MATCH at or above the tenant's auto-promote threshold.
                      updateCount:
                        type: integer
                        description: Rows that match an existing transaction (update path) rather than create.
                      seedReady:
                        type: boolean
                        description: When true, the worker has finished initial classification and the Quick Seed interview should be presented before review.
                      createdAt:
                        type: string
                        format: date-time
                      updatedAt:
                        type: string
                        format: date-time
                      statusSummary:
                        type: object
                        additionalProperties:
                          type: integer
                        description: |
                          Map of `{ <STATUS>: count }` aggregated across the entire import
                          (all statuses, ignoring the `?status` filter).
                        example:
                          PENDING: 12
                          CONFIRMED: 245
                          POTENTIAL_DUPLICATE: 3
                      earliestTransactionDate:
                        type: string
                        format: date-time
                        nullable: true
                  rows:
                    type: array
                    items:
                      $ref: '#/components/schemas/StagedRow'
                  categorySummary:
                    type: array
                    description: |
                      Server-side groupBy across all rows matching the effective `?status` filter
                      (regardless of pagination). Drives grouped-view headers with accurate
                      cross-page counts. Sorted descending by `count`.
                    items:
                      type: object
                      properties:
                        categoryId:
                          type: integer
                          nullable: true
                        category:
                          type: object
                          nullable: true
                          properties:
                            id:
                              type: integer
                            name:
                              type: string
                            group:
                              type: string
                            type:
                              type: string
                        count:
                          type: integer
                          description: Total rows in this category matching the effective `?status` filter.
                        eligibleCount:
                          type: integer
                          description: |
                            Rows in this category that bulk-confirm would actually approve —
                            status in `PENDING`/`ERROR`/`STAGED` AND `requiresEnrichment !== true`.
                            Drives the "Approve All (N)" badge so it reflects all pages.
                  pagination:
                    type: object
                    properties:
                      page:
                        type: integer
                      limit:
                        type: integer
                      total:
                        type: integer
                      totalPages:
                        type: integer
        '401':
          description: Unauthorized
        '403':
          description: Access denied — this import belongs to another tenant.
        '404':
          description: Staged import not found.
        '500':
          description: Internal Server Error
    post:
      summary: Commit or cancel a staged import
      description: |
        Finalises the import. The `action` is read from `?action` query OR the request body
        (query takes precedence). Must be either `commit` or `cancel`.
        - `commit`: Transitions the import to `COMMITTING` and dispatches a `SMART_IMPORT_COMMIT`
          event to the backend worker. Promotes all CONFIRMED rows to permanent Transaction records
          asynchronously. For rows with tags, auto-creates Tag records (find-or-create by name) and
          links them via TransactionTag. After writing transactions, the worker fires non-blocking
          feedback for each committed LLM/USER_OVERRIDE row to build the pgvector embedding index.
          Requires `import.status === 'READY'`. Optional `rowIds` in the body enables partial commit.
        - `cancel`: Synchronously deletes all staged rows and marks the batch as `CANCELLED`. No
          embeddings are generated. Cannot cancel an already-`COMMITTED` import.
      tags:
        - Smart Import
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: The StagedImport ID.
        - name: action
          in: query
          required: false
          schema:
            type: string
            enum: [commit, cancel]
          description: The action to take. Falls back to `body.action` if omitted.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                action:
                  type: string
                  enum: [commit, cancel]
                  description: Used when `?action` query param is not supplied.
                rowIds:
                  type: array
                  items:
                    type: string
                  description: |
                    Commit-only. When provided and non-empty, only these specific staged rows
                    will be committed (partial commit). Omit to commit all CONFIRMED rows.
      responses:
        '200':
          description: Cancel completed synchronously.
          content:
            application/json:
              schema:
                type: object
                properties:
                  cancelled:
                    type: boolean
                    example: true
        '202':
          description: |
            Commit accepted. The import has transitioned to `COMMITTING`; poll
            `GET /api/imports/{id}` for progress and final state.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [COMMITTING]
                  message:
                    type: string
                    example: 'Commit process started. Poll for progress.'
        '400':
          description: |
            Bad Request — missing/invalid `action`, commit attempted while import is not in
            `READY` status, or cancel attempted on a `COMMITTED` import.
        '401':
          description: Unauthorized
        '403':
          description: Access denied.
        '404':
          description: Staged import not found.
        '500':
          description: Internal Server Error — event dispatch failed (commit) or unexpected error.

  /api/imports/{id}/bulk-confirm:
    post:
      summary: Bulk-confirm staged rows in a single request
      description: |
        Confirms every eligible row in a category server-side. Replaces the legacy
        client-side fan-out (one PUT per row) that broke the grouped-view "Approve All"
        button — it tripped the rate limiter and only confirmed the visible page when the
        group spanned multiple pages.

        **Eligibility:** only rows with `status IN ('PENDING','ERROR','STAGED')` AND
        `requiresEnrichment !== true` are confirmed. `POTENTIAL_DUPLICATE` and rows
        needing investment enrichment are skipped silently — they must be reviewed via
        the drawer so re-imported transactions and missing ticker/qty/price data can
        never auto-commit.
      tags:
        - Smart Import
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: The StagedImport ID.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              description: |
                At most one of `categoryId` / `uncategorized` should be sent. When both
                are sent, `uncategorized` wins. Omitting both confirms all eligible rows
                for the import (no category filter).
              properties:
                categoryId:
                  type: integer
                  description: Confirm rows whose `suggestedCategoryId` matches this id.
                uncategorized:
                  type: boolean
                  description: When `true`, confirm rows whose `suggestedCategoryId IS NULL`.
      responses:
        '200':
          description: Bulk confirmation completed.
          content:
            application/json:
              schema:
                type: object
                properties:
                  confirmed:
                    type: integer
                    description: Number of rows transitioned to `CONFIRMED`.
        '400':
          description: |
            Bad Request — invalid `categoryId`, or the import is `COMMITTED` / `CANCELLED`
            (rows of a finalised import cannot be modified).
        '401':
          description: Unauthorized
        '404':
          description: Import not found or belongs to another tenant.
        '500':
          description: Internal Server Error.

  /api/imports/{id}/rows/{rowId}:
    put:
      summary: Override a staged row
      description: |
        Allows the user to override the AI-suggested category, description, or amount for
        a specific staged row before committing. Sets the row status to OVERRIDDEN.
      tags:
        - Smart Import
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: The StagedImport ID.
        - name: rowId
          in: path
          required: true
          schema:
            type: string
          description: The StagedRow ID.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: Fields to override. Only provided fields will be updated.
              properties:
                categoryId:
                  type: integer
                  description: User-selected category to override the AI suggestion.
                description:
                  type: string
                  description: Override for the transaction description.
                amount:
                  type: number
                  description: Override for the transaction amount.
                ticker:
                  type: string
                  description: Investment enrichment — ticker symbol.
                assetQuantity:
                  type: number
                  description: Investment enrichment — number of units.
                assetPrice:
                  type: number
                  description: Investment enrichment — price per unit.
                isin:
                  type: string
                  description: System-resolved ISIN (e.g. IE00BK5BQT80).
                exchange:
                  type: string
                  description: ISO-10383 MIC code (e.g. XETR).
                assetCurrency:
                  type: string
                  description: Currency the asset trades in (e.g. EUR).
                tags:
                  type: array
                  nullable: true
                  items:
                    type: string
                  description: Array of tag name strings (e.g. ["Japan 2026"]). Pass null to clear.
                status:
                  type: string
                  enum: [PENDING, OVERRIDDEN]
                  description: Can be used to un-skip a DUPLICATE row by setting to PENDING.
      responses:
        '200':
          description: Row updated successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StagedRow'
        '400':
          description: Bad Request — invalid override data.
        '401':
          description: Unauthorized
        '403':
          description: Access denied.
        '404':
          description: Staged import or row not found.
        '500':
          description: Internal Server Error

  /api/imports/similar:
    get:
      summary: Find semantically similar previously-classified transactions
      description: |
        Accepts a raw transaction description, proxies to the backend service to generate
        a 768-dim embedding via the configured embedding provider (Gemini or OpenAI), and
        returns the top-5 most semantically similar previously-classified transactions for
        the authenticated tenant.

        Intended to power "did you mean?" category suggestions in the import review UI.
        Only entries with cosine similarity ≥ 0.70 are returned.
      tags:
        - Smart Import
      parameters:
        - name: description
          in: query
          required: true
          schema:
            type: string
          description: The raw transaction description to find similar entries for.
          example: "Netflix subscription"
      responses:
        '200':
          description: Array of similar transactions, sorted by similarity descending.
          content:
            application/json:
              schema:
                type: object
                properties:
                  results:
                    type: array
                    items:
                      $ref: '#/components/schemas/SimilarTransactionResult'
                  query:
                    type: string
                    description: The description that was searched.
                  threshold:
                    type: number
                    description: The similarity threshold applied (default 0.70).
        '400':
          description: Bad Request — missing description parameter.
        '401':
          description: Unauthorized
        '500':
          description: Internal Server Error (e.g. embedding provider API unavailable)
