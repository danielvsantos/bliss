openapi: 3.0.0
info:
  title: Bliss API Layer - Tags
  version: 1.0.0

components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: token
      description: >
        HttpOnly session cookie set by the API at sign-in/sign-up.
        Sent automatically by the browser on all credentialed requests.
  schemas:
    Tag:
      type: object
      properties:
        name:
          type: string
        color:
          type: string
        emoji:
          type: string

security:
  - cookieAuth: []

paths:
  /api/tags:
    get:
      summary: Get all tags for the tenant
      parameters:
        - name: limit
          in: query
          required: false
          description: >
            Maximum number of tags to return. Default is unlimited; max 1000.
            When provided, the response format changes to { tags: [], total: number }.
          schema:
            type: integer
            maximum: 1000
        - name: offset
          in: query
          required: false
          description: Number of tags to skip before returning results. Default 0.
          schema:
            type: integer
            default: 0
      responses:
        '200':
          description: >
            A list of tags. When `limit` is provided, the response is
            { tags: Tag[], total: number }. Otherwise, returns a plain array of tags.
    post:
      summary: Create a new tag
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Tag'
      responses:
        '201':
          description: The created tag.
  /api/tags/{id}:
    put:
      summary: Update a tag
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Tag'
      responses:
        '200':
          description: The updated tag.
    delete:
      summary: Delete a tag
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '204':
          description: The tag was deleted.
