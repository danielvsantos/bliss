openapi: 3.0.0
info:
  title: Bliss API Layer - Admin
  version: 1.1.0
  description: |
    Endpoints under `/api/admin/*`. Two distinct audiences and auth models
    live here; each path documents its own security requirement.

    **1. Default Categories & Cross-Tenant Classification** (ops-staff)

    `/api/admin/default-categories/*`
    Called by Bliss operations staff to provision new default categories,
    push metadata changes across all tenants, and maintain the
    `GlobalEmbedding` cross-tenant classification table.
    Auth: `x-admin-key` request header (`ADMIN_API_KEY` env var). No user
    session.

    **2. Maintenance / Rebuild** (tenant-admin)

    `/api/admin/rebuild`
    Surfaced via the Settings → Maintenance tab. Lets a tenant admin
    manually trigger background rebuilds of analytics and portfolio
    valuations when caches look stale, and observe rebuild status +
    history.
    Auth: JWT cookie + `user.role === 'admin'`. Non-admins get 403.

    See the spec doc in `docs/specs/api/03-reference-data-management.md`
    §3.4 for flow diagrams and operator playbooks on the rebuild
    endpoints.

components:
  securitySchemes:
    adminKeyAuth:
      type: apiKey
      in: header
      name: x-admin-key
      description: >
        Static admin API key set in the ADMIN_API_KEY environment variable.
        Must be provided on every request. Returns 401 if missing or incorrect.
        Applies to the `/api/admin/default-categories/*` endpoints only.
    cookieAuth:
      type: apiKey
      in: cookie
      name: token
      description: >
        HttpOnly session cookie set at sign-in. Applies to
        `/api/admin/rebuild`, which additionally requires
        `user.role === 'admin'` (403 otherwise).

  schemas:
    DefaultCategoryListItem:
      type: object
      description: A default category with live database statistics.
      properties:
        code:
          type: string
          description: SNAKE_UPPER_CASE identifier shared across all tenant rows (e.g. "GROCERIES").
          example: GROCERIES
        name:
          type: string
          description: Human-readable display name.
          example: Groceries
        group:
          type: string
          description: Top-level grouping used for UI display and analytics.
          example: Food & Drink
        type:
          type: string
          description: Broad transaction type (e.g. "Essentials", "Income").
          example: Essentials
        icon:
          type: string
          nullable: true
          description: Emoji icon for this category. Null if not set.
          example: 🛒
        processingHint:
          type: string
          nullable: true
          description: |
            System-managed hint used internally by the classification pipeline.
            Cannot be changed via this API (400 if attempted). Examples: SALARY, INVESTMENT.
          example: null
        portfolioItemKeyStrategy:
          type: string
          enum: [TICKER, CATEGORY_NAME, CATEGORY_NAME_PLUS_DESCRIPTION, IGNORE, CURRENCY]
          description: |
            Controls how portfolio items are keyed when transactions in this category
            are linked to the portfolio. IGNORE = no portfolio link.
          example: IGNORE
        tenantCount:
          type: integer
          description: Number of tenant Category rows that currently have this defaultCategoryCode.
          example: 12
        globalEmbeddingCount:
          type: integer
          description: |
            Number of GlobalEmbedding rows for this code. These are real transaction
            descriptions confirmed by actual users against a default category. Used for
            cross-tenant Tier 2b (VECTOR_MATCH_GLOBAL) classification.
          example: 47

    DefaultCategoryProvisionRequest:
      type: object
      required:
        - code
        - name
        - group
        - type
      properties:
        code:
          type: string
          description: SNAKE_UPPER_CASE identifier. Must be unique. Regex `/^[A-Z0-9_]+$/`.
          example: PET_INSURANCE
        name:
          type: string
          description: Human-readable display name.
          example: Pet Insurance
        group:
          type: string
          description: Top-level UI grouping.
          example: Subscriptions
        type:
          type: string
          description: Broad transaction type.
          example: Living Expenses
        icon:
          type: string
          nullable: true
          description: Optional emoji icon.
          example: 🐾
        processingHint:
          type: string
          nullable: true
          description: |
            Optional system-managed processing hint. Rarely needed; check existing
            categories before using. Cannot be changed once set via PUT.
        portfolioItemKeyStrategy:
          type: string
          nullable: true
          enum: [TICKER, CATEGORY_NAME, CATEGORY_NAME_PLUS_DESCRIPTION, IGNORE, CURRENCY]
          description: Defaults to IGNORE if not provided.

    DefaultCategoryUpdateRequest:
      type: object
      description: |
        All fields are optional — only provided fields are updated.
        At least one field must be present. processingHint is blocked (400).
      properties:
        name:
          type: string
          description: New display name, pushed to all tenant Category rows.
        group:
          type: string
          description: New group, pushed to all tenant Category rows.
        type:
          type: string
          description: New type, pushed to all tenant Category rows.
        icon:
          type: string
          description: New emoji icon, pushed to all tenant Category rows.
        portfolioItemKeyStrategy:
          type: string
          enum: [TICKER, CATEGORY_NAME, CATEGORY_NAME_PLUS_DESCRIPTION, IGNORE, CURRENCY]
          description: New portfolio strategy, pushed to all tenant Category rows.
        newCode:
          type: string
          description: |
            Rename this code to a new SNAKE_UPPER_CASE value. Propagates to:
            - All tenant Category rows (defaultCategoryCode field)
            - All GlobalEmbedding rows for this code
            Must not conflict with an existing code (409 if taken).

    # ─── Maintenance / Rebuild schemas (tenant-admin) ─────────────────────────

    RebuildScope:
      type: string
      enum: [full-portfolio, full-analytics, scoped-analytics, single-asset]
      description: |
        Which rebuild variant to run. Each scope has its own single-flight lock.
          - `full-portfolio`    rebuilds items → cash → analytics → valuation.
          - `full-analytics`    rebuilds AnalyticsCacheMonthly / TagAnalyticsCacheMonthly only.
          - `scoped-analytics`  rebuilds analytics from a given start date onwards.
          - `single-asset`      re-values one portfolio item's price / holdings history.

    RebuildTriggerRequest:
      type: object
      required: [scope]
      properties:
        scope:
          $ref: '#/components/schemas/RebuildScope'
        payload:
          type: object
          description: |
            Scope-specific arguments. Required fields depend on `scope`:
              - `scoped-analytics`: `earliestDate` (ISO 8601 date-time string).
              - `single-asset`:     `portfolioItemId` (integer).
            Ignored for `full-portfolio` and `full-analytics`.
          properties:
            earliestDate:
              type: string
              format: date-time
              example: '2026-03-01T00:00:00.000Z'
            portfolioItemId:
              type: integer
              example: 42

    RebuildTriggerResponse:
      type: object
      required: [status, scope, requestedAt, lockTtlSeconds]
      properties:
        status:
          type: string
          enum: [accepted]
        scope:
          $ref: '#/components/schemas/RebuildScope'
        requestedAt:
          type: string
          format: date-time
          description: Server-side timestamp when the trigger was accepted.
        lockTtlSeconds:
          type: integer
          description: Initial TTL of the single-flight lock (seconds). 3600 by default.
          example: 3600

    RebuildConflictResponse:
      type: object
      description: Returned when the per-scope lock is already held.
      required: [error, scope, ttlSeconds]
      properties:
        error:
          type: string
          example: Rebuild already in progress
        scope:
          $ref: '#/components/schemas/RebuildScope'
        ttlSeconds:
          type: integer
          description: Remaining seconds on the lock. UI uses this to render "Next available in X min".

    RebuildLockInfo:
      type: object
      required: [scope, held]
      properties:
        scope:
          $ref: '#/components/schemas/RebuildScope'
        held:
          type: boolean
        ttlSeconds:
          type: integer
          nullable: true
          description: Remaining seconds on the lock, or null if not held.

    RebuildJobState:
      type: string
      enum: [active, waiting, delayed, completed, failed]

    RebuildJob:
      type: object
      required: [id, name, state, progress, attemptsMade]
      properties:
        id:
          oneOf:
            - type: string
            - type: integer
          description: >
            BullMQ job ID. String for admin-triggered jobs
            (`manual-rebuild-<scope>-<tenantId>-<ts>`), integer for internal.
        name:
          type: string
          description: BullMQ job name (e.g. `full-rebuild-analytics`, `value-all-assets`).
        state:
          $ref: '#/components/schemas/RebuildJobState'
        progress:
          type: integer
          minimum: 0
          maximum: 100
          description: Worker-reported progress 0–100. Unreported values default to 0.
        rebuildType:
          type: string
          nullable: true
          description: The scope the job was triggered under (from `_rebuildMeta.rebuildType`).
        requestedBy:
          type: string
          nullable: true
          description: Email of the admin user who triggered the rebuild.
        requestedAt:
          type: string
          format: date-time
          nullable: true
        startedAt:
          type: string
          format: date-time
          nullable: true
          description: When the worker picked up the job. Null while `waiting`.
        finishedAt:
          type: string
          format: date-time
          nullable: true
        failedReason:
          type: string
          nullable: true
          description: Error message from the final failed attempt (if any).
        attemptsMade:
          type: integer

    RebuildAsset:
      type: object
      description: |
        Lightweight portfolio-item shape used by the single-asset rebuild
        picker. Shipped inside the status response so the Maintenance tab
        avoids hitting `/api/portfolio/items` (which triggers live price
        fetches per asset).
      required: [id, symbol, currency]
      properties:
        id:
          type: integer
        symbol:
          type: string
        currency:
          type: string
        category:
          type: object
          nullable: true
          properties:
            name:
              type: string

    RebuildStatusResponse:
      type: object
      required: [locks, current, recent, assets]
      properties:
        locks:
          type: array
          items:
            $ref: '#/components/schemas/RebuildLockInfo'
          description: One entry per scope (always 4 in the current release).
        current:
          type: array
          items:
            $ref: '#/components/schemas/RebuildJob'
          description: In-flight rebuild jobs (`active`, `waiting`, or `delayed`).
        recent:
          type: array
          items:
            $ref: '#/components/schemas/RebuildJob'
          description: Last 20 completed/failed admin-triggered rebuilds, newest first. Retained 30 days.
        assets:
          type: array
          items:
            $ref: '#/components/schemas/RebuildAsset'

# Default security for paths that don't override below. The
# default-categories endpoints use `adminKeyAuth`; the rebuild endpoints
# override to `cookieAuth` per-operation.
security:
  - adminKeyAuth: []

paths:
  /api/admin/default-categories:
    get:
      summary: List default categories with live stats
      description: |
        Returns all categories defined in `defaultCategories.js` enriched with live
        database statistics: how many tenant rows use this code, and how many
        GlobalEmbedding rows exist for cross-tenant classification.

        Useful for auditing category coverage and embedding density before a
        regenerate-embeddings run.
      tags:
        - Admin — Default Categories
      responses:
        '200':
          description: Array of default categories with stats.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/DefaultCategoryListItem'
        '401':
          description: Unauthorized — missing or incorrect x-admin-key.
        '500':
          description: Internal Server Error.

    post:
      summary: Provision a new default category to all existing tenants
      description: |
        Creates one Category row per existing tenant with the provided code/name/group/type.
        Uses `skipDuplicates: true` so it is safe to re-run — already-provisioned tenants
        are skipped silently.

        Returns 409 if any Category row with this code already exists (use PUT to update).

        **Important:** This endpoint does NOT update `defaultCategories.js`. You must
        also add the new entry to that file manually so future signups receive it.
      tags:
        - Admin — Default Categories
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DefaultCategoryProvisionRequest'
            example:
              code: PET_INSURANCE
              name: Pet Insurance
              group: Subscriptions
              type: Living Expenses
              icon: 🐾
      responses:
        '201':
          description: Category provisioned successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  provisioned:
                    type: integer
                    description: Number of tenant rows created.
                    example: 8
                  note:
                    type: string
                    example: "Remember to add this category to defaultCategories.js so future signups also receive it."
        '400':
          description: |
            Bad Request. Possible reasons:
            - Missing required fields (code, name, group, type)
            - code is not SNAKE_UPPER_CASE
            - portfolioItemKeyStrategy is not a valid enum value
        '401':
          description: Unauthorized.
        '409':
          description: Conflict — a category with this code already exists.
        '500':
          description: Internal Server Error.

  /api/admin/default-categories/{code}:
    put:
      summary: Update a default category across all tenants
      description: |
        Pushes metadata changes (name, group, type, icon, portfolioItemKeyStrategy)
        to ALL tenant Category rows that share this defaultCategoryCode.

        Optionally renames the code itself (`newCode`). A rename also propagates to all
        GlobalEmbedding rows for this code so cross-tenant classification stays consistent.

        **Protected field:** `processingHint` cannot be updated via this API (400 if included).
        It is managed by the system — any change would require a code change.

        **Important:** After updating, also update `defaultCategories.js` manually so new
        signups receive the corrected values.
      tags:
        - Admin — Default Categories
      parameters:
        - name: code
          in: path
          required: true
          schema:
            type: string
          description: The current SNAKE_UPPER_CASE category code to update.
          example: GROCERIES
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DefaultCategoryUpdateRequest'
            examples:
              update_icon:
                summary: Update icon only
                value:
                  icon: 🥦
              rename_code:
                summary: Rename code
                value:
                  newCode: GROCERIES_V2
              update_multiple:
                summary: Update name and icon
                value:
                  name: Grocery Stores
                  icon: 🛒
      responses:
        '200':
          description: Update applied successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  updatedTenantCategories:
                    type: integer
                    description: Number of tenant Category rows updated.
                    example: 12
                  globalEmbeddingsRenamed:
                    type: integer
                    description: Number of GlobalEmbedding rows renamed (only non-zero when newCode was provided).
                    example: 0
                  renamedTo:
                    type: string
                    description: The new code value. Only present when a rename was performed.
                    example: GROCERIES_V2
                  note:
                    type: string
                    example: "Remember to update defaultCategories.js to keep new signups consistent."
        '400':
          description: |
            Bad Request. Possible reasons:
            - No fields provided
            - processingHint included (immutable)
            - newCode is not SNAKE_UPPER_CASE
            - portfolioItemKeyStrategy is not a valid enum value
        '401':
          description: Unauthorized.
        '404':
          description: No categories found with this code.
        '409':
          description: Conflict — newCode is already taken by another category.
        '500':
          description: Internal Server Error.

  /api/admin/default-categories/{code}/regenerate-embeddings:
    post:
      summary: Regenerate embeddings for a category
      description: |
        Re-generates the embedding vectors for ALL existing GlobalEmbedding rows
        under this code using the currently configured embedding provider
        (Gemini, OpenAI, or the one chosen via `EMBEDDING_PROVIDER`). This updates
        the `embedding` vector column in place — no rows are created or deleted.

        **ONLY updates existing rows.** GlobalEmbedding rows are only created by the
        classification pipeline when real users confirm seeds against a default category.
        This endpoint never creates new rows — it only refreshes existing vectors.

        **Use cases:**
        - After an embedding model upgrade (refresh all vectors with the new model output)
        - After switching embedding providers (see `scripts/regenerate-embeddings.js`
          for tenant-scoped `TransactionEmbedding` rebuilds)
        - After a code rename (verify renamed rows still classify correctly)
        - Periodic quality refresh

        Processing is sequential to avoid rate-limiting the upstream API. The response is
        synchronous — it waits for all rows to complete before returning.
      tags:
        - Admin — Default Categories
      parameters:
        - name: code
          in: path
          required: true
          schema:
            type: string
          description: The SNAKE_UPPER_CASE category code whose embeddings should be refreshed.
          example: RESTAURANTS
      responses:
        '200':
          description: Regeneration complete (regardless of per-row failures).
          content:
            application/json:
              schema:
                type: object
                properties:
                  regenerated:
                    type: integer
                    description: Number of rows successfully refreshed.
                    example: 23
                  failed:
                    type: integer
                    description: Number of rows that failed (provider API errors). Check server logs for details.
                    example: 0
                  message:
                    type: string
                    description: Optional message (e.g. "No GlobalEmbedding rows found for code 'X'.").
        '401':
          description: Unauthorized.
        '500':
          description: Internal Server Error (outer error, not per-row failures).

  # ─── Maintenance / Rebuild endpoints (tenant-admin) ─────────────────────────

  /api/admin/rebuild:
    post:
      summary: Trigger an admin rebuild
      description: |
        Acquires the per-(tenant, scope) single-flight lock via Redis
        `SET NX EX 3600`. On success, emits a `MANUAL_REBUILD_REQUESTED`
        event that the backend scheduler routes to the correct BullMQ
        queue based on `scope`.

        Returns 202 before the actual work starts — poll
        `GET /api/admin/rebuild` for progress.

        **Lock release**: the lock releases automatically when the
        terminal job of the chain completes (e.g. `value-all-assets` for
        full-portfolio). The 1-hour TTL is a safety ceiling; in the
        happy path locks release within seconds of the job finishing.

        **Concurrency**: different scopes have independent locks — you
        can run `full-analytics` and `single-asset` in parallel. Two
        triggers for the same scope return 409 on the second one.
      tags:
        - Admin — Maintenance (Rebuild)
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RebuildTriggerRequest'
            examples:
              full_analytics:
                summary: Full analytics rebuild
                value:
                  scope: full-analytics
              full_portfolio:
                summary: Full portfolio rebuild (items → cash → analytics → valuation)
                value:
                  scope: full-portfolio
              scoped_analytics:
                summary: Rebuild analytics from a date onwards
                value:
                  scope: scoped-analytics
                  payload:
                    earliestDate: '2026-03-01T00:00:00.000Z'
              single_asset:
                summary: Re-value one asset
                value:
                  scope: single-asset
                  payload:
                    portfolioItemId: 42
      responses:
        '202':
          description: Rebuild accepted — job enqueued.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RebuildTriggerResponse'
        '400':
          description: |
            Bad Request. Possible reasons:
            - Missing / invalid `scope`.
            - `payload.earliestDate` missing or not a valid ISO date (scoped-analytics).
            - `payload.portfolioItemId` missing or not a number (single-asset).
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
        '401':
          description: Unauthorized — no valid session cookie.
        '403':
          description: Forbidden — user.role is not `admin`.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: Admin access required
        '409':
          description: |
            A rebuild of this scope is already in flight. Response carries
            the remaining lock TTL so the UI can display
            "Next available in X min".
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RebuildConflictResponse'
        '429':
          description: Rate-limited (`rateLimiters.rebuildTrigger`, 20 / 5 min).
        '500':
          description: Internal Server Error (backend proxy failure, Redis down, etc.).

    get:
      summary: Get rebuild status + history + asset picker data
      description: |
        Returns the current per-scope lock state, any in-flight rebuild
        jobs, the last 20 completed/failed admin rebuilds, and a
        lightweight list of the tenant's portfolio items for the
        single-asset picker. Polled every 5 seconds by the Maintenance
        tab; safe to call more frequently (rate limit is 300 / 5 min).

        **Filtering**: only BullMQ jobs carrying `data._rebuildMeta` are
        included. Nightly cron runs, transaction-driven scoped updates,
        and other queue activity are explicitly excluded so the history
        reflects only admin-initiated operations.
      tags:
        - Admin — Maintenance (Rebuild)
      security:
        - cookieAuth: []
      responses:
        '200':
          description: Current status.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RebuildStatusResponse'
        '401':
          description: Unauthorized — no valid session cookie.
        '403':
          description: Forbidden — user.role is not `admin`.
        '429':
          description: Rate-limited (`rateLimiters.rebuildStatus`, 300 / 5 min).
        '500':
          description: Internal Server Error.

tags:
  - name: Admin — Default Categories
    description: |
      Ops-staff endpoints for provisioning and maintaining the global
      default-category catalog. Auth via `x-admin-key`.
  - name: Admin — Maintenance (Rebuild)
    description: |
      Tenant-admin endpoints for manual background-rebuild operations,
      surfaced via the Settings → Maintenance tab.
