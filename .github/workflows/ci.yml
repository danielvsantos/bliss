name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # API: Unit Tests (Vitest, no infrastructure needed)
  # setup/env.ts sets ENCRYPTION_SECRET + JWT_SECRET_CURRENT directly in code.
  # ─────────────────────────────────────────────────────────────────────────────
  api-unit:
    name: API — Unit Tests
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'push' ||
      contains(github.event.pull_request.changed_files, 'apps/api/') ||
      contains(github.event.pull_request.changed_files, 'packages/shared/') ||
      contains(github.event.pull_request.changed_files, 'prisma/')

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared package
        run: pnpm --filter @bliss/shared build

      - name: Run API unit tests
        run: pnpm --filter @bliss/api test:unit

  # ─────────────────────────────────────────────────────────────────────────────
  # API: Integration Tests (Vitest + real Postgres)
  #
  # IMPORTANT — Prisma Accelerate vs direct connection:
  #   postinstall runs "prisma generate --no-engine" (Accelerate client).
  #   That client requires a prisma:// URL and throws on a direct postgresql://
  #   URL. We regenerate with a full-engine client after pnpm install so that
  #   tests can connect directly to the CI Postgres service.
  # ─────────────────────────────────────────────────────────────────────────────
  api-integration:
    name: API — Integration Tests
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/bliss_test
      ENCRYPTION_SECRET: ci-test-secret-exactly-32-bytes!!
      JWT_SECRET_CURRENT: ci-test-jwt-secret-for-integration
      NODE_ENV: test

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: bliss_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared package
        run: pnpm --filter @bliss/shared build

      - name: Regenerate Prisma client with full engine
        run: pnpm --filter @bliss/api exec prisma generate --schema=../../prisma/schema.prisma

      - name: Apply database migrations
        run: pnpm --filter @bliss/api exec prisma migrate deploy --schema=../../prisma/schema.prisma

      - name: Run API integration tests
        run: pnpm --filter @bliss/api test:integration

  # ─────────────────────────────────────────────────────────────────────────────
  # Backend: Unit Tests (Jest, no infrastructure needed)
  # ENCRYPTION_SECRET must be set — encryption.js throws at import if missing.
  # ─────────────────────────────────────────────────────────────────────────────
  backend-unit:
    name: Backend — Unit Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared package
        run: pnpm --filter @bliss/shared build

      - name: Run backend unit tests
        run: pnpm --filter @bliss/backend test:unit
        env:
          ENCRYPTION_SECRET: ci-test-secret-exactly-32-bytes!!

  # ─────────────────────────────────────────────────────────────────────────────
  # Backend: Integration Tests (Jest + supertest + Postgres + Redis)
  #
  # Uses prisma db push (not migrate deploy) — the backend is a schema consumer,
  # not the migration owner. db push creates all tables from schema.prisma
  # directly without requiring a migrations/ folder in apps/backend/.
  # ─────────────────────────────────────────────────────────────────────────────
  backend-integration:
    name: Backend — Integration Tests
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/bliss_test
      REDIS_URL: redis://localhost:6379
      INTERNAL_API_KEY: ci-test-api-key-integration
      ENCRYPTION_SECRET: ci-test-secret-exactly-32-bytes!!
      NODE_ENV: test

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: bliss_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared package
        run: pnpm --filter @bliss/shared build

      - name: Generate Prisma client
        run: pnpm --filter @bliss/backend exec prisma generate --schema=../../prisma/schema.prisma

      - name: Push schema to test database
        run: pnpm --filter @bliss/backend exec prisma db push --schema=../../prisma/schema.prisma --accept-data-loss

      - name: Run backend integration tests
        run: pnpm --filter @bliss/backend test:integration

  # ─────────────────────────────────────────────────────────────────────────────
  # Web: Unit Tests (Vitest + jsdom + MSW, no infrastructure needed)
  # ─────────────────────────────────────────────────────────────────────────────
  web-unit:
    name: Web — Unit Tests
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'push' ||
      contains(github.event.pull_request.changed_files, 'apps/web/') ||
      contains(github.event.pull_request.changed_files, 'packages/shared/')

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared package
        run: pnpm --filter @bliss/shared build

      - name: Run web unit tests
        run: pnpm --filter @bliss/web test

  # ─────────────────────────────────────────────────────────────────────────────
  # Lint: ESLint across web and api (no infrastructure needed)
  # apps/web uses --max-warnings 0 so any warning fails the job.
  # ─────────────────────────────────────────────────────────────────────────────
  lint:
    name: Lint — Web & API
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared package
        run: pnpm --filter @bliss/shared build

      - name: Lint web
        run: pnpm --filter @bliss/web lint

      - name: Lint API
        run: pnpm --filter @bliss/api lint

  # ─────────────────────────────────────────────────────────────────────────────
  # Docker: Build & Smoke Test
  # Ensures the Docker Compose stack builds and starts correctly so that
  # self-hosters always have a working local setup as the app evolves.
  # ─────────────────────────────────────────────────────────────────────────────
  docker-smoke:
    name: Docker — Build & Health Check
    runs-on: ubuntu-latest
    # Run on every push to main; on PRs only when Docker/infra files change
    if: |
      github.ref == 'refs/heads/main' ||
      github.event_name == 'push' ||
      contains(github.event.pull_request.changed_files, 'docker/') ||
      contains(github.event.pull_request.changed_files, 'docker-compose') ||
      contains(github.event.pull_request.changed_files, 'prisma/') ||
      contains(github.event.pull_request.changed_files, 'package.json') ||
      contains(github.event.pull_request.changed_files, 'pnpm-lock.yaml')

    steps:
      - uses: actions/checkout@v4

      - name: Create .env from example
        run: |
          cp .env.example .env
          # Inject generated secrets so the stack can actually start
          sed -i "s|ENCRYPTION_SECRET=.*|ENCRYPTION_SECRET=ci-test-secret-exactly-32-bytes!|" .env
          sed -i "s|JWT_SECRET_CURRENT=.*|JWT_SECRET_CURRENT=ci-test-jwt-secret-32-chars-long!|" .env
          sed -i "s|INTERNAL_API_KEY=.*|INTERNAL_API_KEY=ci-test-internal-api-key|" .env
          sed -i "s|NEXTAUTH_SECRET=.*|NEXTAUTH_SECRET=ci-test-nextauth-secret-value|" .env

      - name: Build Docker stack
        run: docker compose build
        timeout-minutes: 15

      - name: Boot Docker stack
        run: docker compose up -d
        timeout-minutes: 5

      - name: Wait for services to be healthy
        run: |
          # API is port-exposed (3000:3000) — check via TCP from host
          echo "Waiting for API (port 3000)..."
          timeout 90 bash -c 'until nc -z localhost 3000; do sleep 2; done'
          echo "✅ API is up"

          # Backend is intentionally not port-exposed (internal only).
          # Check via docker exec inside the container network instead.
          echo "Waiting for Backend..."
          timeout 90 bash -c '
            until docker compose exec -T backend \
              node -e "
                const http = require(\"http\");
                http.get(\"http://localhost:3001/health\", r => {
                  process.exit(r.statusCode === 200 ? 0 : 1);
                }).on(\"error\", () => process.exit(1));
              " 2>/dev/null; do
              sleep 3
            done
          '
          echo "✅ Backend is up"

      - name: Tear down
        if: always()
        run: docker compose down -v
